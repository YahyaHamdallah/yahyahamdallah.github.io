      <section class="poem-body flashlight-poem-body">
        <header class="poem-header">
          <a class="back-link" href="index.html">Poems</a>
          <h1>i love you</h1>
        </header>

        <section class="flashlight-poem" aria-label="Poem">
          <div class="flashlight-text">
            <p>you say,</p>
            <p class="arabic-plain"><span lang="ar" dir="rtl">أحبّك</span></p>
            <p>and I sink again.</p>
            <p>the words<br />returned only to me.</p>
            <p>set carefully<br />between what is,<br />and what never arrives.</p>
            <p>kept there<br />until it aches.</p>
            <p>waiting to be answered.<br />while you search<br />for something beyond me.</p>
          </div>
        </section>
      </section>

      <figure class="poem-artwork">
        <div class="poem-image-placeholder" aria-hidden="true"></div>
      </figure>

    </section>
  </main>
