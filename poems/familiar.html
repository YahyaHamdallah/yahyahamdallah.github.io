<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>familiar | Journal Discovery</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-nav">
    <a class="nav-brand" href="../index.html">Journal Discovery</a>
    <input class="nav-toggle" type="checkbox" id="nav-toggle" aria-label="Open navigation menu" />
    <label class="nav-tab" for="nav-toggle">Menu</label>
    <nav class="nav-folders" aria-label="Main navigation">
      <a class="nav-folder" href="../poems/index.html">Poems</a>
      <a class="nav-folder" href="../essays/index.html">Essays</a>
      <a class="nav-folder" href="../exploration/index.html">Exploration</a>
    </nav>
  </header>

  <main class="stage poem-stage">
    <section class="page poem-page" aria-label="Poetry journal page">
      <div class="paper-noise"></div>

      <section class="poem-body">
        <header class="poem-header">
          <a class="back-link" href="index.html">Poems</a>
          <h1>familiar</h1>
        </header>

        <section class="poem" aria-label="Poem">
          <div class="line" data-delay="0">
            <span class="cutout tall">I</span>
            <span class="cutout script">lie</span>
            <span class="cutout serif">where</span>
            <span class="cutout red">we</span>
            <span class="cutout small">sat</span>
          </div>

          <div class="line" data-delay="1">
            <span class="cutout serif">tracing</span>
            <span class="cutout italic">the</span>
            <span class="cutout bold">space</span>
            <span class="cutout serif">beside</span>
            <span class="cutout small">me</span>
          </div>

          <div class="line gap" data-delay="2">
            <span class="cutout small">you</span>
            <span class="cutout serif">smelled</span>
            <span class="cutout red large">sweet</span>
          </div>

          <div class="line" data-delay="3">
            <span class="cutout small">and</span>
            <span class="cutout serif">asked</span>
            <span class="cutout dark">what</span>
            <span class="cutout small">I</span>
            <span class="cutout italic">meant</span>
          </div>

          <div class="line gap" data-delay="4">
            <span class="cutout tall">I</span>
            <span class="cutout serif">could</span>
            <span class="cutout red">not</span>
            <span class="cutout italic">explain</span>
          </div>

          <div class="line" data-delay="5">
            <span class="cutout italic">how</span>
            <span class="cutout bold large">familiar</span>
            <span class="cutout serif">you</span>
            <span class="cutout red">felt</span>
            <span class="cutout italic">to</span>
            <span class="cutout small">me</span>
          </div>

          <div class="line gap" data-delay="6">
            <span class="cutout small">so</span>
            <span class="cutout tall">I</span>
            <span class="cutout serif">stay</span>
            <span class="cutout dark">here</span>
            <span class="cutout small">just</span>
          </div>

          <div class="line" data-delay="7">
            <span class="cutout small">to</span>
            <span class="cutout red">feel</span>
            <span class="cutout serif">close</span>
            <span class="cutout small">to</span>
            <span class="cutout serif">you.</span>
          </div>

          <div class="line ending" data-delay="8">
            <span class="cutout italic">careful</span>
            <span class="cutout bold huge">not</span>
            <span class="cutout italic">to</span>
            <span class="cutout serif">forget.</span>
          </div>
        </section>
      </section>

      <figure class="poem-artwork">
        <div class="poem-image-placeholder" aria-hidden="true"></div>
      </figure>

    </section>
  </main>

  <script src="../js/script.js"></script>
</body>
</html>
