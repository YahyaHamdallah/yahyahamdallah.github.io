<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Can&rsquo;t Hold On | Journal Discovery</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-nav">
    <a class="nav-brand" href="../index.html">Journal Discovery</a>
    <input class="nav-toggle" type="checkbox" id="nav-toggle" aria-label="Open navigation menu" />
    <label class="nav-tab" for="nav-toggle">Menu</label>
    <nav class="nav-folders" aria-label="Main navigation">
      <a class="nav-folder" href="../poems/index.html">Poems</a>
      <a class="nav-folder" href="../essays/index.html">Essays</a>
      <a class="nav-folder" href="../exploration/index.html">Exploration</a>
    </nav>
  </header>

  <main class="stage poem-stage">
    <section class="page poem-page hold-page" aria-label="Poetry journal page">
      <div class="paper-noise"></div>

      <section class="poem-body hold-poem-body">
        <header class="poem-header">
          <a class="back-link" href="index.html">Poems</a>
          <h1>Can&rsquo;t Hold On</h1>
        </header>

        <section class="hold-poem" aria-label="Poem">
          <div class="hold-stanza">
            <p class="hold-line felt">I felt it.</p>
          </div>

          <div class="hold-stanza">
            <p class="hold-line">but cannot</p>
            <p class="hold-line">keep it.</p>
          </div>

          <div class="hold-stanza held-place">
            <p>held a place</p>
            <p>for something</p>
            <p>that never arrived.</p>
          </div>

          <div class="hold-stanza">
            <p class="hold-line waiting">waiting</p>
            <p class="hold-line choose">for it to choose me.</p>
          </div>

          <div class="hold-stanza">
            <p class="hold-line real">to become real.</p>
          </div>

          <div class="hold-stanza">
            <p class="hold-line cannot">but I cannot hold on</p>
            <p class="hold-line nothing">to nothing.</p>
          </div>

          <div class="hold-stanza still-here">
            <p>still,</p>
            <p>somehow,</p>
            <p>I am here.</p>
          </div>
        </section>
      </section>

      <figure class="poem-artwork hold-artwork">
        <div class="hold-image" aria-hidden="true"></div>
      </figure>

    </section>
  </main>

  <script src="../js/script.js"></script>
</body>
</html>
